name: build env
on:
  workflow_dispatch:
  schedule:
    - cron: '10 1 * * 1-5'
    
jobs:
  Pixiv-Main:
    runs-on: ubuntu-latest
    steps:                          
    - name: checkout main
      uses: actions/checkout@v2
      with:
        ref: main
        fetch-depth: full

    - name: Docker Login
      uses: docker/login-action@v3.4.0
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        platforms: linux/amd64
        file: ./github.Dockerfile
        push: true
        tags: |
          shirokasoke/mcwebapi:latest
        cache-from: type=registry,ref=shirokasoke/mcwebapi:cache
        cache-to: type=registry,ref=shirokasoke/mcwebapi:cache,mode=max